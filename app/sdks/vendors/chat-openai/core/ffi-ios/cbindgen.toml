# cbindgen configuration for the iOS FFI crate. The generated header
# is consumed by the Swift Package's binary target.

language = "C"
header   = "/* Generated by cbindgen — DO NOT edit by hand. */"
include_guard = "LLMHUB_CHAT_OPENAI_H"
pragma_once = true
documentation = true
style = "type"

# Strip the `llmhub_` prefix nowhere — keep the names symmetric with
# the linker symbols so Swift bindings line up.
[parse]
parse_deps = false

[export]
prefix = ""
include = [
    # Hand-pick the exact functions we want exposed. Anything not in
    # this list is omitted from the header (and Swift can't see it),
    # which keeps the surface honest.
]

[export.rename]
"OnChunkFn"    = "llmhub_on_chunk_fn"
"OnCompleteFn" = "llmhub_on_complete_fn"
"OnErrorFn"    = "llmhub_on_error_fn"

[fn]
prefix = ""
sort_by = "Name"
