# Dev (开发/测试) environment compose file.
#
# 单二进制 llmhub-api + 单 Next.js llmhub-web。
# Postgres / Redis / NATS 全部使用外部已运维的实例。
#
# Required env vars (set on the host or via .env beside this file):
#   REGISTRY_URL            私有镜像仓库地址（如 gitea.ideapsound.com）
#   IMAGE_TAG               镜像 tag（dev 默认 dev-latest）
#   LLMHUB_DB_DSN           外部 PG DSN
#   LLMHUB_REDIS_ADDR       外部 Redis host:port
#   LLMHUB_NATS_URL         外部 NATS URL
#   LLMHUB_ADMIN_TOKEN      admin 后台共享 token
#   LLMHUB_INTERNAL_TOKEN   服务间互信 token（保留供未来扩展）
#   LLMHUB_WEB_ORIGINS      允许的 web 跨域来源（同源部署可留空）
#   PUBLIC_API_BASE         前端注入的 API 基址（默认 http://localhost:8080）

name: llmhub-dev

x-base: &base
  restart: unless-stopped
  logging:
    driver: json-file
    options: { max-size: '20m', max-file: '5' }

services:
  api:
    <<: *base
    image: ${REGISTRY_URL}/llmhub-api:${IMAGE_TAG}
    environment:
      LLMHUB_ENV: dev
      LLMHUB_DB_DSN: ${LLMHUB_DB_DSN}
      LLMHUB_REDIS_ADDR: ${LLMHUB_REDIS_ADDR}
      LLMHUB_NATS_URL: ${LLMHUB_NATS_URL}
      LLMHUB_ADMIN_TOKEN: ${LLMHUB_ADMIN_TOKEN}
      LLMHUB_INTERNAL_TOKEN: ${LLMHUB_INTERNAL_TOKEN}
      LLMHUB_WEB_ORIGINS: ${LLMHUB_WEB_ORIGINS:-}
    ports: ['8080:8080']

  web:
    <<: *base
    image: ${REGISTRY_URL}/llmhub-web:${IMAGE_TAG}
    environment:
      NEXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:8080}
    ports: ['3000:3000']
