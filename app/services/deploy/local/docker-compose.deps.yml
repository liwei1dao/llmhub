# Local external dependencies only (no api/web).
#
# Start:
#   docker compose -f docker-compose.deps.yml up -d
#
# Stop:
#   docker compose -f docker-compose.deps.yml down
#
# Endpoints:
#   pg    → localhost:15432  (user/pw: llmhub/llmhub, db: llmhub)
#   redis → localhost:16379
#   nats  → localhost:14222  (mon: 18222)
#   vault → http://localhost:18200  (token: dev-root-token)

name: llmhub-local

x-base: &base
  restart: unless-stopped
  logging:
    driver: json-file
    options: { max-size: '20m', max-file: '5' }

services:
  postgres:
    <<: *base
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: llmhub
      POSTGRES_PASSWORD: llmhub
      POSTGRES_DB: llmhub
    ports: ['15432:5432']
    volumes:
      - ./.data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U llmhub -d llmhub']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    <<: *base
    image: redis:7-alpine
    ports: ['16379:6379']
    volumes:
      - ./.data/redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    <<: *base
    image: nats:2-alpine
    command: ['-js', '-m', '8222']
    ports:
      - '14222:4222'
      - '18222:8222'

  vault:
    <<: *base
    image: hashicorp/vault:1.17
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ['18200:8200']
    command: server -dev

  migrate:
    image: golang:1.22-alpine
    depends_on:
      postgres: { condition: service_healthy }
    working_dir: /migrations
    volumes:
      - ../../migrations:/migrations:ro
    environment:
      GOPROXY: https://goproxy.cn,direct
      GOBIN: /go/bin
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -e
        if [ ! -x /go/bin/goose ]; then
          go install github.com/pressly/goose/v3/cmd/goose@v3.22.1
        fi
        /go/bin/goose -dir /migrations postgres \
          "postgres://llmhub:llmhub@postgres:5432/llmhub?sslmode=disable" up
    restart: 'no'
