id: deepseek
display_name: DeepSeek

base_url: https://api.deepseek.com

auth:
  mode: bearer
  header: Authorization

protocol_family: openai_compat

supported_capabilities:
  - chat
  - embedding

models:
  chat:
    - logical_id: gpt-4o-class
      upstream: deepseek-chat
      pricing:
        input_per_1k_cents: 0.30
        output_per_1k_cents: 1.20
    - logical_id: deepseek-r1-class
      upstream: deepseek-reasoner
      pricing:
        input_per_1k_cents: 0.50
        output_per_1k_cents: 2.00

probe:
  chat:
    model: deepseek-chat
    test_prompt: "hi"
