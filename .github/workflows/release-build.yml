# ============================================================
# 正式环境：构建带版本号的镜像，仅构建不部署
#
# 触发：手动 workflow_dispatch（输入版本号）
#
# 镜像：${REGISTRY_URL}/llmhub-<service>:${version}
#       同时推送 ${REGISTRY_URL}/llmhub-<service>:latest
#       并把当前 commit 打成同名 git tag，便于部署脚本回滚时
#       能 checkout 出对应的 web 资源
#
# 需要的 Variables：
#   REGISTRY_URL       私有 registry 地址
#   REGISTRY_USER      registry 用户名
#
# 需要的 Secrets：
#   REGISTRY_PASS      registry 密码
# ============================================================
name: Prod Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号（如 0.1.0，必须形如 X.Y.Z）'
        required: true
        type: string

concurrency:
  group: prod-build
  cancel-in-progress: false

env:
  IMAGE_PREFIX: llmhub

jobs:
  prepare:
    name: 校验 + 检出 main
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: 校验版本号格式
        env:
          VER: ${{ inputs.version }}
        run: |
          if [[ ! "${VER}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version 必须形如 0.1.0，当前: ${VER}"
            exit 1
          fi

      - name: 检出 main
        env:
          TOKEN: ${{ github.token }}
        run: |
          git init -b main .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin main
          git checkout FETCH_HEAD
          echo "构建 commit: $(git rev-parse HEAD)"

      - name: 检查 git tag 是否已存在
        env:
          TOKEN: ${{ github.token }}
          VER: ${{ inputs.version }}
        run: |
          if git ls-remote --tags "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git" \
              | grep -q "refs/tags/${VER}$"; then
            echo "git tag ${VER} 已存在，请换一个版本号（避免覆盖已发布版本）"
            exit 1
          fi

  build:
    name: 构建并推送正式镜像
    needs: prepare
    runs-on: self-hosted
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: gateway,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=gateway' }
          - { name: scheduler, ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=scheduler' }
          - { name: account,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=account' }
          - { name: billing,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=billing' }
          - { name: worker,    ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=worker' }
          - { name: cli,       ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=cli' }
          - { name: www,       ctx: app/web, dockerfile: app/web/Dockerfile,    build_arg: 'APP=www' }
          - { name: console,   ctx: app/web, dockerfile: app/web/Dockerfile,    build_arg: 'APP=console' }
          - { name: admin,     ctx: app/web, dockerfile: app/web/Dockerfile,    build_arg: 'APP=admin' }

    steps:
      - name: 检出 main
        env:
          TOKEN: ${{ github.token }}
        run: |
          git init -b main .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin main
          git checkout FETCH_HEAD

      - name: 登录私有镜像仓库
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_USER: ${{ vars.REGISTRY_USER }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASS }}
        run: |
          echo "${REGISTRY_PASS}" | docker login "${REGISTRY_URL}" -u "${REGISTRY_USER}" --password-stdin

      - name: 构建并推送 ${{ matrix.component.name }} (version + latest)
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          VER: ${{ inputs.version }}
        run: |
          IMG_BASE="${REGISTRY_URL}/${IMAGE_PREFIX}-${{ matrix.component.name }}"
          IMG_VER="${IMG_BASE}:${VER}"
          IMG_LATEST="${IMG_BASE}:latest"
          docker build --network=host \
            --build-arg ${{ matrix.component.build_arg }} \
            -f ${{ matrix.component.dockerfile }} \
            -t "${IMG_VER}" -t "${IMG_LATEST}" \
            ${{ matrix.component.ctx }}
          docker push "${IMG_VER}"
          docker push "${IMG_LATEST}"

  tag:
    name: 打 git tag
    needs: build
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: 检出 main
        env:
          TOKEN: ${{ github.token }}
        run: |
          git init -b main .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin main
          git checkout FETCH_HEAD

      - name: 打 tag 并推送
        env:
          TOKEN: ${{ github.token }}
          VER: ${{ inputs.version }}
        run: |
          git tag "${VER}"
          git push "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git" "${VER}"

      - name: 构建摘要
        if: always()
        run: |
          echo "### 正式镜像构建" >> $GITHUB_STEP_SUMMARY
          echo "- 版本: \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 镜像: \`${{ vars.REGISTRY_URL }}/${IMAGE_PREFIX}-*:${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- latest: \`${{ vars.REGISTRY_URL }}/${IMAGE_PREFIX}-*:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- git tag: \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 部署请运行 **Prod Deploy** workflow" >> $GITHUB_STEP_SUMMARY
