name: release · build production images

# Triggered when a semver tag is pushed on `main` (e.g. v0.1.0).
# Only builds & pushes immutable images — does NOT deploy.
# Production rollout is the prod-deploy workflow, run manually.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Leave blank to derive from tag.'
        required: false
        type: string

env:
  REGISTRY: ${{ vars.REGISTRY_HOST || 'gitea.ideapsound.com' }}
  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE || 'liwei' }}

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF#refs/tags/}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

  verify-branch:
    name: Verify tag is on main
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject tags not reachable from main
        run: |
          set -e
          git fetch origin main:main || true
          if ! git merge-base --is-ancestor "$GITHUB_SHA" main; then
            echo "❌ commit $GITHUB_SHA is not on main; production builds must come from main."
            exit 1
          fi

  build:
    name: Build & push images
    needs: [prepare, verify-branch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: gateway,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_args: 'SERVICE=gateway' }
          - { name: scheduler, ctx: app,     dockerfile: app/deploy/Dockerfile, build_args: 'SERVICE=scheduler' }
          - { name: account,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_args: 'SERVICE=account' }
          - { name: billing,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_args: 'SERVICE=billing' }
          - { name: worker,    ctx: app,     dockerfile: app/deploy/Dockerfile, build_args: 'SERVICE=worker' }
          - { name: cli,       ctx: app,     dockerfile: app/deploy/Dockerfile, build_args: 'SERVICE=cli' }
          - { name: www,       ctx: app/web, dockerfile: app/web/Dockerfile,    build_args: 'APP=www' }
          - { name: console,   ctx: app/web, dockerfile: app/web/Dockerfile,    build_args: 'APP=console' }
          - { name: admin,     ctx: app/web, dockerfile: app/web/Dockerfile,    build_args: 'APP=admin' }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push ${{ matrix.component.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.ctx }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          build-args: ${{ matrix.component.build_args }}
          # Production tags are immutable: <semver> is the canonical
          # promotable artifact; `latest` and `<MAJOR.MINOR>` are
          # convenience aliases also published.
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/llmhub-${{ matrix.component.name }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/llmhub-${{ matrix.component.name }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://gitea.ideapsound.com/liwei/llmhub
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/llmhub-${{ matrix.component.name }}:cache-release
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/llmhub-${{ matrix.component.name }}:cache-release,mode=max

  summary:
    name: Release summary
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## ✅ release ${{ needs.prepare.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Images pushed to \`${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/llmhub-*\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run **prod · deploy** to roll out to production." >> "$GITHUB_STEP_SUMMARY"
