# ============================================================
# CI：质量门槛 — go vet / build / test / golden / proto lint / web typecheck
#
# 触发：push 到 main / pull_request
# 注意：不在 dev 分支跑（dev 走 Dev Build & Deploy）
#
# 设计原则：完全不依赖 github.com 上的 actions —— Gitea Actions
# runner 在中国网络下从 github clone 极慢，因此 checkout /
# setup-go / golangci-lint / buf / pnpm 全部用裸命令实现。
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.22.6'
  GOLANGCI_VERSION: 'v1.61.0'
  BUF_VERSION: '1.45.0'

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 不在 CI 里临时拉起 postgres/redis/nats —— 当前 *_test.go 全部
    # 是纯逻辑单测 + golden 协议一致性，零外部依赖。如果未来加集成
    # 测试，再按需放回 services 块。

    defaults:
      run:
        working-directory: app

    steps:
      - name: 检出代码
        env:
          TOKEN: ${{ github.token }}
          REF: ${{ github.sha }}
        working-directory: ${{ github.workspace }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "$REF"
          git checkout FETCH_HEAD

      - name: 安装 Go ${{ env.GO_VERSION }}
        working-directory: ${{ github.workspace }}
        run: |
          if command -v go >/dev/null && go version | grep -q "${GO_VERSION}"; then
            echo "Go ${GO_VERSION} 已就绪"
          else
            curl -fsSL "https://golang.google.cn/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
            sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          fi
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          export PATH="/usr/local/go/bin:$PATH"
          go version
          go env -w GOPROXY=https://goproxy.cn,direct

      - name: go vet
        run: go vet ./...

      - name: 安装并运行 golangci-lint
        run: |
          if ! command -v golangci-lint >/dev/null; then
            curl -fsSL "https://github.com/golangci/golangci-lint/releases/download/${GOLANGCI_VERSION}/golangci-lint-${GOLANGCI_VERSION#v}-linux-amd64.tar.gz" \
              -o /tmp/gci.tgz \
              || curl -fsSL "https://gitea.ideapsound.com/mirrors/golangci-lint/releases/download/${GOLANGCI_VERSION}/golangci-lint-${GOLANGCI_VERSION#v}-linux-amd64.tar.gz" -o /tmp/gci.tgz
            tar -xzf /tmp/gci.tgz -C /tmp
            sudo install -m 0755 "/tmp/golangci-lint-${GOLANGCI_VERSION#v}-linux-amd64/golangci-lint" /usr/local/bin/golangci-lint
          fi
          golangci-lint run

      - name: build
        run: make build

      - name: 单元测试
        run: go test ./... -race -count=1

      - name: golden 协议一致性
        run: make test-golden

  proto:
    name: Proto lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: app/proto
    steps:
      - name: 检出代码
        env:
          TOKEN: ${{ github.token }}
          REF: ${{ github.sha }}
        working-directory: ${{ github.workspace }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "$REF"
          git checkout FETCH_HEAD

      - name: 安装 buf
        working-directory: ${{ github.workspace }}
        run: |
          if ! command -v buf >/dev/null; then
            curl -fsSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" -o /tmp/buf
            sudo install -m 0755 /tmp/buf /usr/local/bin/buf
          fi
          buf --version

      - run: buf lint
      - run: buf format -d

  web:
    name: Web lint & typecheck (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        app: [www, console, admin]
    defaults:
      run:
        working-directory: app/web/${{ matrix.app }}
    steps:
      - name: 检出代码
        env:
          TOKEN: ${{ github.token }}
          REF: ${{ github.sha }}
        working-directory: ${{ github.workspace }}
        run: |
          git init .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "$REF"
          git checkout FETCH_HEAD

      - name: 启用 pnpm
        working-directory: ${{ github.workspace }}
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm config set registry https://registry.npmmirror.com
          node --version
          pnpm --version

      - name: install
        run: pnpm install --no-frozen-lockfile

      - name: lint
        run: pnpm lint --if-present

      - name: typecheck
        run: pnpm typecheck --if-present
