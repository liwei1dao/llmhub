# ============================================================
# 开发环境：编译 dev 分支代码 → 推 dev-latest → 自动部署到 dev 主机
#
# 触发：push 到 dev 分支（自动）/ 手动 workflow_dispatch
#
# 镜像：${REGISTRY_URL}/llmhub-<service>:dev-latest
#       同时推送 ${REGISTRY_URL}/llmhub-<service>:dev-${SHORT_SHA}
#
# 需要的 Variables（用户/组织级即可）：
#   REGISTRY_URL       私有 registry 地址（如 gitea.ideapsound.com）
#   REGISTRY_USER      registry 用户名
#   DEV_PUBLIC_URL     dev 环境对外地址（仅展示）
#   DEV_SSH_HOST       dev 主机 IP / 域名
#   DEV_SSH_USER       SSH 用户
#   DEV_SSH_PORT       SSH 端口（可选，默认 22；省略即用 22）
#   DEV_DEPLOY_DIR     主机上 docker compose 工作目录（含 .env）
#
# 需要的 Secrets：
#   REGISTRY_PASS      registry 密码
#   DEV_SSH_KEY        dev 主机 SSH 私钥（PEM 整段）
# ============================================================
name: Dev Build & Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: dev-deploy
  cancel-in-progress: false

env:
  IMAGE_PREFIX: llmhub
  IMAGE_TAG: dev-latest

jobs:
  build:
    name: 构建并推送镜像
    runs-on: self-hosted
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: gateway,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=gateway' }
          - { name: scheduler, ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=scheduler' }
          - { name: account,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=account' }
          - { name: billing,   ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=billing' }
          - { name: worker,    ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=worker' }
          - { name: cli,       ctx: app,     dockerfile: app/deploy/Dockerfile, build_arg: 'SERVICE=cli' }
          - { name: www,       ctx: app/web, dockerfile: app/web/Dockerfile,    build_arg: 'APP=www' }
          - { name: console,   ctx: app/web, dockerfile: app/web/Dockerfile,    build_arg: 'APP=console' }
          - { name: admin,     ctx: app/web, dockerfile: app/web/Dockerfile,    build_arg: 'APP=admin' }

    steps:
      - name: 检出 dev 分支
        env:
          TOKEN: ${{ github.token }}
        run: |
          git init -b dev .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin dev
          git checkout FETCH_HEAD
          echo "构建 commit: $(git rev-parse HEAD)"
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: 登录私有镜像仓库
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_USER: ${{ vars.REGISTRY_USER }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASS }}
        run: |
          echo "${REGISTRY_PASS}" | docker login "${REGISTRY_URL}" -u "${REGISTRY_USER}" --password-stdin

      - name: 构建并推送 ${{ matrix.component.name }}
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          IMG_BASE="${REGISTRY_URL}/${IMAGE_PREFIX}-${{ matrix.component.name }}"
          IMG_LATEST="${IMG_BASE}:${IMAGE_TAG}"
          IMG_SHA="${IMG_BASE}:dev-${SHORT_SHA}"
          docker build --network=host \
            --build-arg ${{ matrix.component.build_arg }} \
            -f ${{ matrix.component.dockerfile }} \
            -t "${IMG_LATEST}" -t "${IMG_SHA}" \
            ${{ matrix.component.ctx }}
          docker push "${IMG_LATEST}"
          docker push "${IMG_SHA}"

  deploy:
    name: 部署到 dev 主机
    needs: build
    runs-on: self-hosted
    timeout-minutes: 10
    environment:
      name: dev
      url: ${{ vars.DEV_PUBLIC_URL }}

    steps:
      - name: 检出 dev 分支（取 compose 文件）
        env:
          TOKEN: ${{ github.token }}
        run: |
          git init -b dev .
          git remote add origin "http://oauth2:${TOKEN}@gitea:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin dev
          git checkout FETCH_HEAD

      - name: 准备 SSH 密钥
        env:
          KEY: ${{ secrets.DEV_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ vars.DEV_SSH_PORT || 22 }}" -H "${{ vars.DEV_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 同步 compose 文件到 dev 主机
        env:
          PORT: ${{ vars.DEV_SSH_PORT || 22 }}
          USER_HOST: ${{ vars.DEV_SSH_USER }}@${{ vars.DEV_SSH_HOST }}
          DEPLOY_DIR: ${{ vars.DEV_DEPLOY_DIR }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=accept-new "$USER_HOST" "mkdir -p '$DEPLOY_DIR'"
          scp -i ~/.ssh/id_deploy -P "$PORT" -o StrictHostKeyChecking=accept-new \
            app/deploy/dev/docker-compose.yml "$USER_HOST:$DEPLOY_DIR/docker-compose.yml"

      - name: 拉镜像 + 滚动重启
        env:
          PORT: ${{ vars.DEV_SSH_PORT || 22 }}
          USER_HOST: ${{ vars.DEV_SSH_USER }}@${{ vars.DEV_SSH_HOST }}
          DEPLOY_DIR: ${{ vars.DEV_DEPLOY_DIR }}
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_USER: ${{ vars.REGISTRY_USER }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASS }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=accept-new "$USER_HOST" \
            REGISTRY_URL="$REGISTRY_URL" REGISTRY_USER="$REGISTRY_USER" REGISTRY_PASS="$REGISTRY_PASS" \
            DEPLOY_DIR="$DEPLOY_DIR" 'bash -s' << 'EOSSH'
          set -euo pipefail
          cd "$DEPLOY_DIR"
          export IMAGE_TAG=dev-latest
          echo "$REGISTRY_PASS" | docker login "$REGISTRY_URL" -u "$REGISTRY_USER" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          EOSSH

      - name: 部署摘要
        if: always()
        run: |
          echo "### Dev 构建 & 部署" >> $GITHUB_STEP_SUMMARY
          echo "- 镜像: \`${{ vars.REGISTRY_URL }}/${IMAGE_PREFIX}-*:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 主机: \`${{ secrets.DEV_SSH_HOST }}:${{ secrets.DEV_SSH_PORT || 22 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 入口: ${{ vars.DEV_PUBLIC_URL }}" >> $GITHUB_STEP_SUMMARY
